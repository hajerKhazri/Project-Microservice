<div class="page-header">
  <h1>{{ isEdit ? 'Modifier' : 'Nouvelle' }} formation</h1>
</div>

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-grid">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Titre</mat-label>
        <input matInput formControlName="titre" placeholder="Titre de la formation">
        <mat-error *ngIf="form.get('titre')?.hasError('required')">Le titre est obligatoire</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" rows="4" placeholder="Description de la formation"></textarea>
      </mat-form-field>

      <div class="row">
        <mat-form-field appearance="outline">
          <mat-label>Date de début</mat-label>
          <input matInput [matDatepicker]="pickerDebut" formControlName="dateDebut">
          <mat-datepicker-toggle matIconSuffix [for]="pickerDebut"></mat-datepicker-toggle>
          <mat-datepicker #pickerDebut></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Date de fin</mat-label>
          <input matInput [matDatepicker]="pickerFin" formControlName="dateFin">
          <mat-datepicker-toggle matIconSuffix [for]="pickerFin"></mat-datepicker-toggle>
          <mat-datepicker #pickerFin></mat-datepicker>
        </mat-form-field>
      </div>

      <div class="row">
        <mat-form-field appearance="outline">
          <mat-label>Statut</mat-label>
          <mat-select formControlName="statut">
            <mat-option *ngFor="let s of statuts" [value]="s">{{ getStatutLabel(s) }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Avancement (%)</mat-label>
          <input matInput type="number" formControlName="avancement" min="0" max="100">
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button mat-button type="button" routerLink="/formations">Annuler</button>
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
          <mat-icon>save</mat-icon>
          {{ isEdit ? 'Mettre à jour' : 'Créer' }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
