server.port=8091
spring.application.name=API-GATWAYY

# Eureka
eureka.instance.instance-id=${spring.application.name}:8091
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}

# Evaluation Route
spring.cloud.gateway.routes[0].id=evaluation-service
spring.cloud.gateway.routes[0].uri=lb://EVALUATION-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/reviews/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

# Project Route
spring.cloud.gateway.routes[1].id=service-projet
spring.cloud.gateway.routes[1].uri=lb://SERVICE-PROJET
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/projets/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

# Skills Route
spring.cloud.gateway.routes[2].id=skills-service
spring.cloud.gateway.routes[2].uri=lb://SKILLS-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/skills/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0

# Messaging Route
spring.cloud.gateway.routes[3].id=messagerie-service
spring.cloud.gateway.routes[3].uri=lb://MESSAGERIE-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/messageries/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=0

# Formation Route
spring.cloud.gateway.routes[4].id=formation-service
spring.cloud.gateway.routes[4].uri=lb://GESTION-FORMATION
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/formations/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=0

# Candidature Route
spring.cloud.gateway.routes[5].id=condidature-service
spring.cloud.gateway.routes[5].uri=lb://CONDIDATURE-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/condidatures/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=0

# User-Service Routes (Django)
spring.cloud.gateway.routes[6].id=user-auth-service
spring.cloud.gateway.routes[6].uri=${USER_SERVICE_URL:http://localhost:8000}
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[7].id=user-data-service
spring.cloud.gateway.routes[7].uri=${USER_SERVICE_URL:http://localhost:8000}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[8].id=user-health-service
spring.cloud.gateway.routes[8].uri=${USER_SERVICE_URL:http://localhost:8000}
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/health/**

# Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://freestyle-keycloak:8080/realms/freelink
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://freestyle-keycloak:8080/realms/freelink/protocol/openid-connect/certs
# For dev, we might need to skip certificate validation if using HTTPS later, but for now it's HTTP.

# Response Header Deduping
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web.server.adapter.HttpWebHandlerAdapter=TRACE
