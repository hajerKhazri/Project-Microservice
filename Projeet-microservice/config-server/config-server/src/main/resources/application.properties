server.port=${CONFIG_SERVER_PORT:8888}
spring.application.name=config-server

spring.cloud.config.server.git.uri=${CONFIG_REPO_URI:https://github.com/hajerKhazri/config-repo.git}
spring.cloud.config.server.git.clone-on-start=${CONFIG_REPO_CLONE_ON_START:false}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.instance-id=${spring.application.name}:${server.port}
