services:
  postgres:
    image: postgres:16
    container_name: userservice-postgres
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - userservice_postgres_data:/var/lib/postgresql/data

  userservice:
    build: .
    container_name: userservice-app
    depends_on:
      - postgres
    environment:
      DJANGO_SECRET_KEY: django-insecure-userservice-dev-key
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,userservice,host.docker.internal
      CORS_ALLOW_ALL_ORIGINS: "true"
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"

volumes:
  userservice_postgres_data:
